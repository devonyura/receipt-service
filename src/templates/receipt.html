<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        font-family: Arial, sans-serif;
        width: 80mm;
        margin: 0;
        padding: 10px;
        background: white;
      }
      .receipt {
        text-align: center;
      }
      .header {
        border-bottom: 1px dashed #000;
        padding-bottom: 10px;
        margin-bottom: 10px;
      }
      .items {
        text-align: left;
        margin: 10px 0;
      }
      .item {
        display: flex;
        justify-content: space-between;
        padding: 5px 0;
        border-bottom: 1px dotted #ccc;
      }
      .total {
        font-weight: bold;
        font-size: 18px;
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid #000;
      }
      .footer {
        margin-top: 10px;
        font-size: 12px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div class="receipt">
      <div class="header">
        <h2>{{storeName}}</h2>
        <p>{{storeAddress}}</p>
      </div>

      <div class="items">
        <h3>Items</h3>
        {{itemsHtml}}
      </div>

      <div class="total">Total: Rp {{total}}</div>

      <div class="footer">
        <p>{{date}}</p>
        <p>Terima kasih!</p>
      </div>
    </div>
  </body>
</html>
